name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (android or ios)'
        required: true
        type: choice
        options:
          - android
          - ios
      debug:
        description: 'Build debug variant (unchecked = release)'
        required: false
        type: boolean
        default: false

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Prepare Android local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          if [ -n "$ANDROID_SDK_ROOT" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          elif [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Run on every push/PR to main, or when workflow_dispatch targets android
    if: >
      (github.event_name == 'push' || github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'android')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Prepare Android local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          if [ -n "$ANDROID_SDK_ROOT" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          elif [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          fi
      - name: Ensure Gradle wrapper is executable
        working-directory: android
        run: chmod +x gradlew
      - name: Create debug keystore if absent
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.debug }}" == "true" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'ios'
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build IPA (no code signing)
        run: flutter build ipa --no-codesign
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/
          retention-days: 30
