name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (android or ios)'
        required: true
        type: choice
        options:
          - android
          - ios
      debug:
        description: 'Build debug variant (unchecked = release)'
        required: false
        type: boolean
        default: false

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Prepare Android local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          if [ -n "$ANDROID_SDK_ROOT" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          elif [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Run on every push/PR to main, or when workflow_dispatch targets android
    if: >
      (github.event_name == 'push' || github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'android')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Prepare Android local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          if [ -n "$ANDROID_SDK_ROOT" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          elif [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          fi
      - name: Ensure Gradle wrapper is executable
        working-directory: android
        run: chmod +x gradlew
      - name: Create debug keystore if absent
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.debug }}" == "true" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'ios'
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get

      # Code-signing steps run only when the required secrets are present.
      # To enable signed builds, add these four repository secrets:
      #   APPLE_CERTIFICATE_BASE64          – base64-encoded Apple distribution .p12 certificate
      #   APPLE_CERTIFICATE_PASSWORD        – password for the .p12 certificate
      #   APPLE_PROVISIONING_PROFILE_BASE64 – base64-encoded .mobileprovision file
      #   KEYCHAIN_PASSWORD                 – a temporary password for the CI keychain
      - name: Import code-signing certificate
        if: >
          env.APPLE_CERTIFICATE_BASE64 != '' &&
          env.APPLE_CERTIFICATE_PASSWORD != '' &&
          env.KEYCHAIN_PASSWORD != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install provisioning profile
        if: env.APPLE_PROVISIONING_PROFILE_BASE64 != ''
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision \
            | plutil -extract UUID raw -)
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          rm profile.mobileprovision

      - name: Build IPA (signed for real device)
        if: >
          env.APPLE_CERTIFICATE_BASE64 != '' &&
          env.APPLE_PROVISIONING_PROFILE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Build IPA (no code signing – fallback when secrets are absent)
        if: >
          env.APPLE_CERTIFICATE_BASE64 == '' ||
          env.APPLE_PROVISIONING_PROFILE_BASE64 == ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "Signing secrets not found – building without code signing."
          echo "The resulting IPA cannot be installed on real devices."
          echo "Add APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD,"
          echo "APPLE_PROVISIONING_PROFILE_BASE64, and KEYCHAIN_PASSWORD secrets"
          echo "to enable signed builds."
          flutter build ipa --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/
          retention-days: 30

