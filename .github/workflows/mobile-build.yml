name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Mobile App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export mobile app
        working-directory: artifacts/mobile
        run: pnpm exec expo export --platform all
        env:
          EXPO_PUBLIC_DOMAIN: localhost

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: artifacts/mobile/dist/
          retention-days: 30
