name: Mobile Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - android
          - ios
      debug:
        description: 'Build debug APK/IPA (unchecked builds a production release)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build Mobile App
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export mobile app
        working-directory: artifacts/mobile
        run: pnpm exec expo export --platform all
        env:
          EXPO_PUBLIC_DOMAIN: localhost

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build
          path: artifacts/mobile/dist/
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'android'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Expo Prebuild (Android)
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_DOMAIN: localhost

      - name: Create Android signing keystore (release builds only)
        if: github.event.inputs.debug != 'true'
        run: |
          # Creates a development keystore so the release APK can be installed
          # on test devices. For public distribution, replace with a proper
          # release keystore stored as GitHub secrets.
          keytool -genkeypair -v \
            -keystore artifacts/mobile/android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Build APK
        working-directory: artifacts/mobile/android
        run: |
          if [ "${{ github.event.inputs.debug }}" == "true" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Upload debug APK
        if: github.event.inputs.debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: github.event.inputs.debug != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'ios'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Expo Prebuild (iOS)
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform ios --clean --no-install
        env:
          EXPO_PUBLIC_DOMAIN: localhost

      - name: Install CocoaPods dependencies
        working-directory: artifacts/mobile/ios
        run: pod install

      - name: Build iOS app archive
        working-directory: artifacts/mobile/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace file found after prebuild. Check that expo prebuild completed successfully and generated the expected Xcode project structure." >&2
            exit 1
          fi
          SCHEME="${WORKSPACE%.xcworkspace}"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/app.xcarchive/Products/Applications/"*.app "$RUNNER_TEMP/Payload/"
          if [ -z "$(ls -A "$RUNNER_TEMP/Payload")" ]; then
            echo "Error: No .app bundle found in archive. Check that the xcodebuild archive step succeeded." >&2
            exit 1
          fi
          cd "$RUNNER_TEMP"
          zip -r app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/app.ipa
          retention-days: 30
