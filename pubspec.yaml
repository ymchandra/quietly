name: quietly
description: "Quietread — a calm, eye-friendly mobile reading app for free public-domain books."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.0
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  phosphor_flutter: ^2.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png
