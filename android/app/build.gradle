plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = [:]
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.eachLine('UTF-8') { line ->
        def trimmed = line?.trim()
        if (!trimmed || trimmed.startsWith('#') || !trimmed.contains('=')) return
        def separator = trimmed.indexOf('=')
        def key = trimmed.substring(0, separator).trim()
        def value = trimmed.substring(separator + 1).trim()
        localProperties[key] = value
    }
}

def flutterVersionCode = localProperties['flutter.versionCode']
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties['flutter.versionName']
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.ymchandra.mobile.app.quietly"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.ymchandra.mobile.app.quietly"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    buildTypes {
        release {
            // Keep release unsigned in CI unless a dedicated release keystore is configured.
        }
    }
}

flutter {
    source '../..'
}
